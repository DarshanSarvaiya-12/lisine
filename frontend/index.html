<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lisine</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: sans-serif;
      background: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.5;
      border: 1.5px solid #1a73e8;
      color: #111;
    }

    .msg.user {
      align-self: flex-end;
      background: #e8f0fe;
    }

    .msg.bot {
      align-self: flex-start;
      background: #fff;
    }

    #input-row {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-top: 1.5px solid #1a73e8;
      gap: 10px;
      background: #fff;
    }

    #msg-input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #1a73e8;
      border-radius: 24px;
      font-size: 15px;
      outline: none;
      color: #111;
    }

    #msg-input::placeholder { color: #aaa; }

    #send-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #send-btn svg {
      fill: #1a73e8;
      width: 28px;
      height: 28px;
      transition: opacity 0.2s;
    }

    #send-btn:hover svg { opacity: 0.7; }
  </style>
</head>
<body>

  <div id="chat"></div>

  <div id="input-row">
    <input id="msg-input" type="text" placeholder="Message Lisine..." autocomplete="off" />
    <button id="send-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
      </svg>
    </button>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');

    function addMsg(text, role) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      addMsg(text, 'user');

      const thinking = addMsg('...', 'bot');

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        const data = await res.json();
        thinking.textContent = data.reply || 'No response.';
      } catch (e) {
        thinking.textContent = 'Error reaching server.';
      }
    }

    sendBtn.addEventListener('click', send);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
  </script>

</body>
</html>
